name: release-please

on:
  push:
    branches: [master]

# [RED-TEAM H1] Default permissions: zero. Scope only to the job that needs them.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # bump versions, write tags
      pull-requests: write  # open/update the release PR
      issues: write         # release-please opens issues on failure
    steps:
      # [RED-TEAM H1] Pin third-party actions to commit SHA, not tag.
      # SHA below = release-please-action v4 (resolved 2026-06-05).
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
