name: release-build

# Builds signed installers + latest.json for a tag created by release-please.
# Trigger: manual via `pnpm release:build` (gh-cli wrapper) OR direct
# `gh workflow run release-build.yml -f tag=vX.Y.Z`.
#
# GitHub Actions quirk: tags created by GITHUB_TOKEN (release-please) do NOT
# fire downstream workflows, so this workflow is manual-by-design. Switch to
# a PAT in release-please.yml if you later want auto-chain.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist, e.g. v0.3.0)"
        required: true
        type: string

permissions: {}  # RED-TEAM H1: zero default; scope per-job

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag: $TAG (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-tag
    permissions:
      contents: write  # tauri-action uploads to the release on this tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       target: aarch64-apple-darwin,     label: mac-arm64 }
          - { os: macos-15-intel, target: x86_64-apple-darwin,      label: mac-x64 }   # RED-TEAM C3
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, label: linux-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      # RED-TEAM H1: third-party actions pinned to commit SHA.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with: { version: 10 }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-06-05
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - id: sidecar-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: src-tauri/binaries
          key: ccusage-sidecars-${{ hashFiles('scripts/fetch-ccusage-sidecars.sh', 'scripts/ccusage-sidecars.sha256') }}

      - name: Fetch ccusage sidecars
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        run: bash scripts/fetch-ccusage-sidecars.sh

      - name: Verify sidecar checksums  # RED-TEAM C1
        run: |
          cd src-tauri/binaries
          shasum -a 256 -c ../../scripts/ccusage-sidecars.sha256

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with: { workspaces: 'src-tauri -> target' }

      - run: pnpm install --frozen-lockfile

      # Build directly via the Tauri CLI instead of tauri-action so that:
      # (1) .sig files remain on disk for the upload step below — tauri-action
      #     cleans them up after its own (skipped) latest.json attempt.
      # (2) latest.json upload is fully under our control with stable asset
      #     names + signature merge across the matrix.
      # NOTE: macOS Apple signing intentionally not wired here. Phase 4 adds
      # APPLE_* env block once Developer ID cert is real. Until then bundles
      # are unsigned (user does right-click → Open on first launch); minisign
      # auto-update still works.
      - name: Build signed Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload installers + updater archive + signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
          LABEL: ${{ matrix.label }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          REPO="${{ github.repository }}"

          echo "=== bundle dir contents ==="
          ls -R "$BUNDLE_DIR" || true
          echo "=== end ==="

          # Locate updater archive + sig defensively — Tauri puts them in
          # platform-specific subdirs (macos/, appimage/) and the exact name
          # varies by version/arch.
          case "$TARGET" in
            aarch64-apple-darwin) PLATFORM="darwin-aarch64"; ARCH_SUFFIX="aarch64" ;;
            x86_64-apple-darwin)  PLATFORM="darwin-x86_64";  ARCH_SUFFIX="x64" ;;
            x86_64-unknown-linux-gnu) PLATFORM="linux-x86_64"; ARCH_SUFFIX="" ;;
            *) echo "::error::Unknown target $TARGET"; exit 1 ;;
          esac

          # Updater archive on macOS is *.app.tar.gz; on Linux it's the
          # raw *.AppImage (Tauri v2 also emits *.AppImage.tar.gz.sig in some
          # versions, but the updater consumes the AppImage directly).
          if [[ "$PLATFORM" == darwin-* ]]; then
            SRC_SIG=$(find "$BUNDLE_DIR" -name '*.app.tar.gz.sig' -print -quit)
          else
            SRC_SIG=$(find "$BUNDLE_DIR" -name '*.AppImage.sig' -print -quit)
            # Fall back to the .tar.gz wrapper if the bundler chose that form.
            [[ -z "$SRC_SIG" ]] && SRC_SIG=$(find "$BUNDLE_DIR" -name '*.AppImage.tar.gz.sig' -print -quit)
          fi
          [[ -n "$SRC_SIG" ]] || { echo "::error::No updater .sig found under $BUNDLE_DIR"; exit 1; }
          SRC_ARCHIVE="${SRC_SIG%.sig}"
          [[ -f "$SRC_ARCHIVE" ]] || { echo "::error::Missing archive $SRC_ARCHIVE"; exit 1; }

          # Stable destination name so latest.json URLs are predictable.
          if [[ "$PLATFORM" == darwin-* ]]; then
            DEST_NAME="agentmeter_${ARCH_SUFFIX}.app.tar.gz"
          else
            DEST_NAME=$(basename "$SRC_ARCHIVE")
          fi

          # Ensure release shell exists (release-please usually created it on
          # merge, but workflow_dispatch on an old tag may need it).
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "" --target master

          STAGE=$(mktemp -d)
          cp "$SRC_ARCHIVE" "${STAGE}/${DEST_NAME}"
          cp "$SRC_SIG"     "${STAGE}/${DEST_NAME}.sig"

          # Also upload user-facing installers from the same bundle dir.
          INSTALLERS=()
          while IFS= read -r f; do INSTALLERS+=("$f"); done < <(
            find "$BUNDLE_DIR" \
              \( -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \) \
              -type f
          )

          gh release upload "$TAG" \
            "${STAGE}/${DEST_NAME}" \
            "${STAGE}/${DEST_NAME}.sig" \
            "${INSTALLERS[@]}" \
            --clobber

          SIG_CONTENT=$(cat "$SRC_SIG")
          URL="https://github.com/${REPO}/releases/download/${TAG}/${DEST_NAME}"
          mkdir -p frag
          jq -n \
            --arg p "$PLATFORM" \
            --arg s "$SIG_CONTENT" \
            --arg u "$URL" \
            '{($p): {signature: $s, url: $u}}' \
            > "frag/${LABEL}.json"

      - name: Upload platform fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: updater-fragment-${{ matrix.label }}
          path: frag/${{ matrix.label }}.json
          if-no-files-found: error

  publish-updater-json:
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: fragments
          pattern: updater-fragment-*
          merge-multiple: true

      - name: Build + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Merge all per-platform fragments into one .platforms map.
          PLATFORMS=$(jq -s 'reduce .[] as $f ({}; . * $f)' fragments/*.json)
          jq -n \
            --arg v "$VERSION" \
            --arg d "$PUB_DATE" \
            --argjson p "$PLATFORMS" \
            '{version: $v, notes: "", pub_date: $d, platforms: $p}' \
            > latest.json
          cat latest.json
          gh release upload "$TAG" latest.json --clobber
